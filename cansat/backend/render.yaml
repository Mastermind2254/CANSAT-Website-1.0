services:
  - type: web
    name: cansat-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: cansat-redis
          property: connectionString

  - type: redis
    name: cansat-redis
    plan: free
